machine:
  certSANs:
  - chi
  - 127.0.0.1
  - 192.168.1.249
  install:
    disk: /dev/disk/by-id/nvme-Samsung_SSD_980_1TB_S78HNL0X202650F
    wipe: true
    bootloader: true
  disks:
  - device: /dev/disk/by-id/nvme-Samsung_SSD_980_1TB_S78HNL0X201241F
    partitions:
      - mountpoint: /var/lib/longhorn-nvme
  files:
    - content: |
        [metrics]
          address = "0.0.0.0:11234"
      path: /etc/cri/conf.d/20-customization.part
      op: create
  network:
    hostname: chi
    interfaces:
      - interface: enp1s0
        dhcp: true
        dhcpOptions:
          ipv4: true
          ipv6: false
      - interface: enp2s0
        dhcp: true
        dhcpOptions:
          ipv4: true
          ipv6: false
      - interface: wg0
        mtu: 1420
        addresses:
          - 10.55.12.1/24
        wireguard:
          privateKey: ${CHI_WG_PRIVATE_KEY}
          listenPort: 51821
          peers:
            - publicKey: ${PSI_WG_PUBLIC_KEY}
              endpoint: 192.168.1.250:51821
              allowedIPs:
                - 10.55.12.2/32
            - publicKey: ${OMEGA_WG_PUBLIC_KEY}
              endpoint: 192.168.1.251:51821
              allowedIPs:
                - 10.55.12.3/32
            - publicKey: ${SPOT_1_WG_PUBLIC_KEY}
              allowedIPs:
                - 10.55.12.10/32
            - publicKey: ${SPOT_2_WG_PUBLIC_KEY}
              allowedIPs:
                - 10.55.12.11/32
            - publicKey: ${SPOT_3_WG_PUBLIC_KEY}
              allowedIPs:
                - 10.55.12.12/32
            - publicKey: ${SPOT_4_WG_PUBLIC_KEY}
              allowedIPs:
                - 10.55.12.13/32
            - publicKey: ${SPOT_5_WG_PUBLIC_KEY}
              allowedIPs:
                - 10.55.12.14/32
  kubelet:
    nodeIP:
      validSubnets:
      - 192.168.1.249/32
      - fdeb:abba:237c::/48
  sysfs:
    devices.system.cpu.cpu0.cpufreq.scaling_governor: performance
    devices.system.cpu.cpu1.cpufreq.scaling_governor: performance
    devices.system.cpu.cpu2.cpufreq.scaling_governor: performance
    devices.system.cpu.cpu3.cpufreq.scaling_governor: performance
